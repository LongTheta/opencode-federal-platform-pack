name: Quality Gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci || npm install

      - name: Verify pack
        run: npm run verify

      - name: Run tests
        run: npm test

      - name: Validate fixtures
        run: |
          node scripts/validate-schema.js review-score tests/fixtures/valid-review-score.json
          node scripts/validate-schema.js quality-gate tests/fixtures/valid-quality-gate.json
